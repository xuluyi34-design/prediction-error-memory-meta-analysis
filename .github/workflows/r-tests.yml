name: R tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      USE_BUNDLED_LIBUV: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: Rscript analysis/install_packages.R

      - name: Run tests
        run: Rscript tests/testthat.R
